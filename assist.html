<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Request for Assistance</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      margin: 0;
      padding: 20px;
      line-height: 1.5;
    }
    .container {
      max-width: 680px;
      margin: 30px auto;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.08);
      overflow: hidden;
    }
    .header {
      background: #0d47a1;
      color: white;
      padding: 24px 30px;
      text-align: center;
    }
    .header h1 {
      margin: 0;
      font-size: 1.6rem;
    }
    .content {
      padding: 30px;
    }
    .form-group {
      margin-bottom: 22px;
    }
    label {
      display: block;
      margin-bottom: 7px;
      font-weight: 600;
      color: #333;
    }
    input, textarea, select {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 1rem;
      box-sizing: border-box;
    }
    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
    }
    textarea {
      min-height: 140px;
      resize: vertical;
    }
    .required::after {
      content: " *";
      color: #dc2626;
    }
    .btn {
      background: #2563eb;
      color: white;
      border: none;
      padding: 14px 28px;
      font-size: 1.05rem;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s;
    }
    .btn:hover {
      background: #1d4ed8;
    }
    .btn:active {
      background: #1e40af;
    }
    .footer-note {
      margin-top: 28px;
      font-size: 0.92rem;
      color: #4b5563;
      text-align: center;
    }
    .two-column {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 22px;
    }

    @media (max-width: 600px) {
      .two-column {
        grid-template-columns: 1fr;
      }
      .container {
        margin: 15px;
      }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>Request for Assistance</h1>
  </div>

  <div class="content">

    <form action="https://formsubmit.co/your@email.com" method="POST" id="assist-form">

      <!-- Change the action="" address to the real email -->

      <div class="form-group">
        <label for="fullname" class="required">Full Name</label>
        <input type="text" id="fullname" name="Full Name" required placeholder="Buong pangalan">
      </div>

      <div class="two-column">
        <div class="form-group">
          <label for="contact">Contact Number</label>
          <input type="tel" id="contact" name="Contact Number" placeholder="09XX-XXX-XXXX" required>
        </div>
        <div class="form-group">
          <label for="email">Email Address <small>(if available)</small></label>
          <input type="email" id="email" name="Email" placeholder="example@gmail.com">
        </div>
      </div>

      <div class="form-group">
        <label for="address">Complete Address</label>
        <textarea id="address" name="Address" rows="2" placeholder="Purok" required></textarea>
      </div>

      <div class="form-group">
        <label for="details" class="required">Detalye ng request</label>
        <textarea id="details" name="Request Details" required placeholder="Ilahad ng maliwanag ang request."></textarea>
      </div>


      <!-- Honeypot spam protection (do NOT remove or rename) -->
      <input type="text" name="_gotcha" style="display:none">

      <div style="text-align:center; margin-top: 35px;">
        <button type="submit" class="btn">Submit Request</button>
      </div>

      <div class="footer-note">
        Maraming salamat po sa inyong pagdulog. Lagi naming hangad ang kayo mapaglingkuran.
    </form>

  </div>
</div>

</body>
</html>
